<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nilufarim uchun...</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            text-align: center; font-family: 'Times New Roman', Times, serif; 
            background: linear-gradient(135deg, #fff0f6 0%, #ffdeeb 100%); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative;
        }
        
        /* ASOSIY OQ RAMKA (KONTEYNER) */
        .container {
            background-color: rgba(255, 255, 255, 0.9); padding: 30px 20px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4); backdrop-filter: blur(10px); 
            width: 90%; max-width: 360px; position: relative; z-index: 5;
            height: 420px;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
        }
        .subtitle { color: #751a3d; font-size: 18px; font-style: italic; margin-bottom: 15px; line-height: 1.5; }
        h1 { color: #c2185b; font-size: 28px; margin-top: 0; margin-bottom: 20px; letter-spacing: 0.5px; }
        
        /* TUGMALAR FAQAT SHU OQ HUDUD ICHIDA YURADI */
        .btn-box { 
            position: relative; 
            width: 100%; 
            height: 200px; 
            margin-top: 10px;
        }
        .btn { 
            width: 110px; /* Tugmalar o'lchami ixcham va bir xil qilindi */
            height: 45px;
            font-size: 18px; font-weight: bold; border: none; border-radius: 50px; 
            font-family: 'Times New Roman', Times, serif; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            cursor: pointer; touch-action: none; position: absolute;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Boshlang'ich holatda tugmalar chiroyli va tartibli turadi */
        #yes { 
            background-color: #2ecc71; color: white; 
            left: 15%; top: 60px; z-index: 6; 
        }
        #no { 
            background-color: #ff4d6d; color: white; 
            right: 15%; top: 60px; z-index: 7; 
            transition: all 0.1s ease-out;
        }
        
        .success-message { display: none; color: #ff1493; font-size: 28px; font-weight: bold; line-height: 1.4; margin-top: 60px; }
        .sparkle-container { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .sparkle { position: absolute; width: 8px; height: 8px; background-color: #ffd700; border-radius: 50%; box-shadow: 0 0 10px #ffd700, 0 0 20px #ffeb3b; opacity: 0; }
        @keyframes flyUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.3) rotate(360deg); opacity: 0; }
        }
        .animate-sparkle { animation: flyUp 4s infinite linear; }
    </style>
</head>
<body>

    <!-- Telefonlar uchun maxsus eng ishonchli va chiroyli mayin musiqa -->
    <audio id="romanticMusic" src="https://soundhelix.com" loop preload="auto"></audio>

    <div class="sparkle-container" id="sparkleBox"></div>
    
    <div class="container">
        <div id="hideBlock">
            <div class="subtitle">Men uchun qadrli boʻlgan insonim, hayotim mazmuni, Nilufarimmm... ✨</div>
            <h1>Meni kechirasanmi? 🥺❤️</h1>
        </div>
        
        <div class="btn-box" id="btnContainer">
            <button class="btn" id="yes" onclick="celebrate()">HA</button>
            <button class="btn" id="no" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton(event)">YOʻQ</button>
        </div>
        
        <div class="success-message" id="successText">URAAAA! 🎉<br>Rahmat Nilufarim, seni judayam yaxshi koʻraman! 🥰✨❤️</div>
    </div>

    <script>
        // "YO'Q" TUGMASINI "HA" NING USTIGA CHIQARMASDAN FAQAT ATROFDA QOCHIRISH
        function moveButton(event) {
            if(event) event.preventDefault();
            
            var container = document.getElementById('btnContainer');
            var yesBtn = document.getElementById('yes');
            var noBtn = document.getElementById('no');
            
            var maxX = container.clientWidth - noBtn.offsetWidth;
            var maxY = container.clientHeight - noBtn.offsetHeight;
            
            var randomX, randomY;
            var isTooClose = true;
            
            // "HA" tugmasining koordinatalarini aniqlash
            var yesLeft = yesBtn.offsetLeft;
            var yesTop = yesBtn.offsetTop;
            
            // "YO'Q" tugmasi "HA"ning ustiga mutloq chiqib qolmasligini tekshirish tsikli
            while (isTooClose) {
                randomX = Math.random() * maxX;
                randomY = Math.random() * maxY;
                
                // Masofani o'lchash (Tugmalar ustma-ust tushmasligi shart)
                var distanceX = Math.abs(randomX - yesLeft);
                var distanceY = Math.abs(randomY - yesTop);
                
                if (distanceX > 90 || distanceY > 40) {
                    isTooClose = false;
                }
            }
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function random(min, max) { return Math.random() * (max - min) + min; }
        
        function celebrate() {
            document.getElementById('hideBlock').style.display = 'none';
            document.getElementById('btnContainer').style.display = 'none'; 
            document.getElementById('successText').style.display = 'block';
            
            var music = document.getElementById('romanticMusic');
            music.volume = 0.5;
            music.play().catch(function(e) { console.log("Ovoz cheklandi"); });

            var sparkleBox = document.getElementById('sparkleBox'); 
            sparkleBox.style.display = 'block';
            for (var i = 0; i < 40; i++) {
                var sparkle = document.createElement('div'); sparkle.className = 'sparkle animate-sparkle';
                sparkle.style.left = random(0, 100) + 'vw'; 
                sparkle.style.animationDelay = random(0, 4) + 's'; 
                sparkle.style.animationDuration = random(3, 5) + 's';
                var colors = ['#ffd700', '#ffeb3b', '#ffffff', '#ff69b4', '#ffb6c1'];
                sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                var size = random(6, 10) + 'px'; sparkle.style.width = size; sparkle.style.height = size;
                sparkleBox.appendChild(sparkle);
            }
        }
    </script>
</body>
</html>
